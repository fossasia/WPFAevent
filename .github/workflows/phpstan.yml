name: Run PHPStan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  file-filter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      php: ${{ steps.filter.outputs.php }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            php:
              - '**/*.php'

  phpstan-analysis:
    name: PHPStan Static Code Analysis
    needs: file-filter
    if: |
      always() &&
      (github.event_name == 'push' || needs.file-filter.outputs.php == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Restore PHPStan Result Cache
        id: phpstan-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: tmp/phpstan
          key: phpstan-result-cache-${{ github.run_id }}
          restore-keys: |
            phpstan-result-cache-

      - name: Install PHP dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: '--prefer-dist --optimize-autoloader --no-scripts'

      - name: Run PHPStan with Reviewdog Comments
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.REVIEWDOG_TOKEN }}
        run: |
          vendor/bin/phpstan analyse --error-format=checkstyle | reviewdog -f=checkstyle -name="phpstan" -reporter=github-pr-review -level=error

      - name: Save PHPStan Result Cache
        uses: actions/cache/save@v5
        if: ${{ !cancelled() }}
        with:
          path: tmp/phpstan
          key: ${{ steps.phpstan-cache-restore.outputs.cache-primary-key }}
